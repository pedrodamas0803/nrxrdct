site_name: nrxrdct
site_description: X-ray diffraction computed tomography — full XRD-CT data-reduction pipeline
repo_url: https://github.com/pedrodamas0803/nrxrdct
repo_name: nrxrdct
edit_uri: edit/main/docs/

theme:
  name: readthedocs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true
            ignore_errors: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/custom.css

nav:
  - Home: index.md
  - Installation: installation.md
  - User Guide:
    - Quickstart: user-guide/quickstart.md
    - Typical Workflow: user-guide/workflow.md
    - SLURM / HPC Integration: user-guide/slurm.md
    - GPU Support: user-guide/gpu.md
    - Laue Diffraction:
      - Diffraction and Laue Theory: user-guide/laue_theory.md
      - Thin-Film Satellites: user-guide/laue_thin_film_satellites.md
      - Layered Structures: user-guide/laue_layered_structures.md
      - Darwin Model (Thick Layers): user-guide/laue_darwin.md
      - Orientation Plotting: user-guide/laue_orientation_plotting.md
      - Strain Analysis: user-guide/laue_strain.md
      - Elastic Stress from Strain Maps: user-guide/laue_stress.md
      - Grain Map Merging and Symmetry Reduction: user-guide/laue_grain_map_merge.md
  - Examples:
    - SLURM Pipeline: examples/slurm_pipeline.md
  - API Reference:
    - utils: api/utils.md
    - azimuthal:
      - integration: api/integration.md
      - slurm_integration: api/slurm_integration.md
    - fitting:
      - peakfit: api/peakfit.md
      - nmf: api/nmf.md
    - fluo:
      - fluorescence: api/fluorescence.md
    - rietveld:
      - refinement: api/refinement.md
      - refine_dict: api/refine_dict.md
    - xrdct:
      - io: api/io.md
      - parameters: api/parameters.md
      - preprocessing: api/preprocessing.md
      - sinogram: api/sinogram.md
      - reconstruction: api/reconstruction.md
      - visualization: api/visualization.md
      - volume: api/volume.md
      - slurm_reconstruction: api/slurm_reconstruction.md
    - laue: api/laue.md
