site_name: nrxrdct
site_description: Synchrotron X-ray diffraction analysis — Laue simulation, orientation/strain mapping, segmentation, powder diffraction, XRF, and XRD-CT
repo_url: https://github.com/pedrodamas0803/nrxrdct
repo_name: nrxrdct
edit_uri: edit/main/docs/

theme:
  name: readthedocs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - css/custom.css

nav:
  - Home: index.md
  - Installation: installation.md
  - User Guide:
    - XRD-CT:
      - Quickstart: user-guide/quickstart.md
      - Typical Workflow: user-guide/workflow.md
      - SLURM / HPC Integration: user-guide/slurm.md
      - GPU Support: user-guide/gpu.md
      - Scanning 3DXRD (s3DXRD): user-guide/s3dxrd.md
    - Laue Diffraction:
      - Diffraction and Laue Theory: user-guide/laue_theory.md
      - Laue Theory References: user-guide/laue_theory_refs.md
      - Thin-Film Satellites: user-guide/laue_thin_film_satellites.md
      - Thin-Film Satellite References: user-guide/laue_thin_film_satellites_refs.md
      - Layered Structures: user-guide/laue_layered_structures.md
      - Darwin Model (Thick Layers): user-guide/laue_darwin.md
      - Rod Tangency and Per-Pixel Simulation: user-guide/laue_rod_tangency.md
      - Spot Segmentation: user-guide/laue_segmentation.md
      - Orientation Plotting: user-guide/laue_orientation_plotting.md
      - Strain Analysis: user-guide/laue_strain.md
      - Image-Based Refinement: user-guide/laue_image_refinement.md
